<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Avi Crane | Infinity Financial Services</title>

    <style>
        /* CSS Reset & Typography */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; color: #444; line-height: 1.7; background-color: #fdfdfd; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 600; color: #003b5c; }
        
        /* Top Utility Bar */
        .top-bar { background-color: #003b5c; color: #fff; padding: 12px 5%; font-size: 13px; display: flex; justify-content: space-between; flex-wrap: wrap; letter-spacing: 0.5px; position: relative; z-index: 1000; }
        .top-bar .contact-info span { margin-right: 20px; }
        .top-bar .creds { opacity: 0.85; font-size: 12px; font-weight: bold; }
        .top-bar a { color: #fff; text-decoration: none; font-weight: 600; }

        /* Main Navigation */
        .navbar { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .logos { display: flex; align-items: center; gap: 30px; }
        .logos img { height: 65px; width: auto; object-fit: contain; }
        .nav-buttons { display: flex; gap: 15px; align-items: center; }
        
        /* Default Nav Buttons */
        .nav-button { background: #009b9f; color: #fff; padding: 12px 25px; text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: background 0.3s; border-radius: 2px; border: none; font-family: inherit; cursor: pointer; }
        .nav-button:hover { background: #007a7d; }
        
        /* Special Green Join Our Firm Button */

        .hero h1 { color: #fff; font-size: 3.5rem; margin-bottom: 20px; line-height: 1.2; max-width: 900px; margin-left: auto; margin-right: auto; }

        /* New Hero Alliance Box */

        .hero-alliance-box h3 { color: #fff; font-size: 2.2rem; margin-bottom: 10px; }
        .hero-alliance-box p { color: #e0e6ed; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.6; }
        .button-group { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; max-width: 1000px; margin: auto; }
        .alliance-btn { background: #009b9f; color: #fff; padding: 15px 25px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; transition: background 0.3s; cursor: pointer; border: none; font-size: 0.85rem; flex: 1 1 auto; min-width: 250px; text-align: center; }
        .alliance-btn:hover { background: #007a7d; }
        .alliance-btn.outline { background: transparent; border: 2px solid #009b9f; color: #009b9f; }
        .alliance-btn.outline:hover { background: rgba(0, 155, 159, 0.1); color: #007a7d; }
        .alliance-btn.light { background: #fff; color: #003b5c; border: 2px solid #fff; }
        .alliance-btn.light:hover { background: #f0f4f7; color: #00263c; }

        /* Inner Sub-Buttons for the Modal */
        .sub-button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; margin-bottom: 20px; }
        .sub-btn { background: #f0f4f7; color: #003b5c; padding: 15px; border: 1px solid #dce4e8; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; transition: 0.3s; cursor: pointer; font-size: 0.8rem; text-align: center; }
        .sub-btn:hover { background: #003b5c; color: #fff; }

        /* Bouncing Scroll Down Arrow */
        .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 2.5rem; text-decoration: none; animation: bounce 2s infinite; cursor: pointer; z-index: 5; opacity: 0.8; }
        .scroll-down:hover { opacity: 1; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-15px) translateX(-50%); }
            60% { transform: translateY(-7px) translateX(-50%); }
        }

        /* Location Bar */
        .locations { background: #f0f4f7; padding: 25px 5%; text-align: center; font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #e0e6ed; position: relative; z-index: 2; }
        .locations strong { color: #003b5c; margin-right: 5px; }

        /* Content Sections */
        .section { padding: 90px 5%; max-width: 1250px; margin: auto; position: relative; z-index: 2; }
        .section-title { text-align: center; font-size: 2.8rem; margin-bottom: 20px; }
        .section-subtitle { text-align: center; font-size: 1.1rem; color: #666; margin-bottom: 60px; max-width: 800px; margin-left: auto; margin-right: auto; }

        .diff-text { flex: 2; min-width: 320px; font-size: 1.05rem; }

        .diff-card h3 { font-size: 1.8rem; margin-bottom: 5px; color: #003b5c; }
        .diff-card h4 { font-family: 'Open Sans', sans-serif; font-size: 0.85rem; color: #009b9f; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
