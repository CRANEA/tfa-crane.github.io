<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avi Crane | Infinity Financial Services</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Open+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Typography */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; color: #444; line-height: 1.7; background-color: #fdfdfd; scroll-behavior: smooth; }
        h1, h2, h3, h4 { font-family: 'Playfair Display', serif; font-weight: 600; color: #003b5c; }
        
        /* Top Utility Bar */
        .top-bar { background-color: #003b5c; color: #fff; padding: 12px 5%; font-size: 13px; display: flex; justify-content: space-between; flex-wrap: wrap; letter-spacing: 0.5px; position: relative; z-index: 1000; }
        .top-bar .contact-info span { margin-right: 20px; }
        .top-bar .creds { opacity: 0.85; font-size: 12px; font-weight: bold; }
        .top-bar a { color: #fff; text-decoration: none; font-weight: 600; }

        /* Main Navigation */
        .navbar { background: #fff; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eaeaea; position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .logos { display: flex; align-items: center; gap: 30px; }
        .logos img { height: 65px; width: auto; object-fit: contain; }
        .nav-buttons { display: flex; gap: 15px; }
        .nav-button { background: #009b9f; color: #fff; padding: 12px 25px; text-decoration: none; font-weight: 600; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; transition: background 0.3s; border-radius: 2px; }
        .nav-button:hover { background: #007a7d; }
        .nav-button.outline { background: transparent; color: #003b5c; border: 2px solid #003b5c; }
        .nav-button.outline:hover { background: #003b5c; color: #fff; }

        /* REDESIGNED Hero Section */
        .hero { position: relative; background: linear-gradient(rgba(0, 25, 40, 0.88), rgba(0, 25, 40, 0.88)), url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=2070&auto=format&fit=crop') center/cover; padding: 120px 5% 150px 5%; text-align: center; color: #fff; z-index: 1; }
        .hero h1 { color: #fff; font-size: 3.5rem; margin-bottom: 20px; line-height: 1.2; max-width: 900px; margin-left: auto; margin-right: auto; }
        .hero p.subtitle { font-size: 1.25rem; max-width: 800px; margin: 0 auto; font-weight: 300; letter-spacing: 0.5px; margin-bottom: 25px; }
        .hero-badge { display: inline-block; background: #009b9f; color: white; padding: 8px 20px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; font-size: 0.9rem; margin-bottom: 40px; }
        
        /* New Hero Alliance Box */
        .hero-alliance-box { background: rgba(0, 59, 92, 0.95); padding: 40px; border-radius: 8px; max-width: 850px; margin: 0 auto; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(5px); box-shadow: 0 15px 40px rgba(0,0,0,0.4); position: relative; z-index: 10; }
        .hero-alliance-box h3 { color: #fff; font-size: 2.2rem; margin-bottom: 10px; }
        .hero-alliance-box p { color: #e0e6ed; font-size: 1.1rem; margin-bottom: 25px; line-height: 1.6; }
        .button-group { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; align-items: center; max-width: 1000px; margin: auto; }
        .alliance-btn { background: #009b9f; color: #fff; padding: 15px 25px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; transition: background 0.3s; cursor: pointer; border: none; font-size: 0.85rem; flex: 1 1 auto; min-width: 250px; text-align: center; }
        .alliance-btn:hover { background: #007a7d; }
        .alliance-btn.outline { background: transparent; border: 2px solid #009b9f; }
        .alliance-btn.outline:hover { background: rgba(0, 155, 159, 0.2); }
        .alliance-btn.light { background: #fff; color: #003b5c; border: 2px solid #fff; }
        .alliance-btn.light:hover { background: #f0f4f7; color: #00263c; }

        /* Inner Sub-Buttons for the Modal */
        .sub-button-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 30px; margin-bottom: 20px; }
        .sub-btn { background: #f0f4f7; color: #003b5c; padding: 15px; border: 1px solid #dce4e8; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; transition: 0.3s; cursor: pointer; font-size: 0.8rem; text-align: center; }
        .sub-btn:hover { background: #003b5c; color: #fff; }

        /* Bouncing Scroll Down Arrow */
        .scroll-down { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #fff; font-size: 2.5rem; text-decoration: none; animation: bounce 2s infinite; cursor: pointer; z-index: 5; opacity: 0.8; }
        .scroll-down:hover { opacity: 1; }
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0) translateX(-50%); }
            40% { transform: translateY(-15px) translateX(-50%); }
            60% { transform: translateY(-7px) translateX(-50%); }
        }

        /* Location Bar */
        .locations { background: #f0f4f7; padding: 25px 5%; text-align: center; font-size: 13px; color: #555; text-transform: uppercase; letter-spacing: 2px; border-bottom: 1px solid #e0e6ed; position: relative; z-index: 2; }
        .locations strong { color: #003b5c; margin-right: 5px; }

        /* Content Sections */
        .section { padding: 90px 5%; max-width: 1250px; margin: auto; position: relative; z-index: 2; }
        .section-title { text-align: center; font-size: 2.8rem; margin-bottom: 20px; }
        .section-subtitle { text-align: center; font-size: 1.1rem; color: #666; margin-bottom: 60px; max-width: 800px; margin-left: auto; margin-right: auto; }

        /* Differentiator Section */
        .diff-grid { display: flex; flex-wrap: wrap; gap: 60px; margin-bottom: 40px; align-items: stretch; }
        .diff-text { flex: 2; min-width: 320px; font-size: 1.05rem; }
        
        /* Engaging Contact Profile Card */
        .diff-card { flex: 1; min-width: 320px; background: #fff; padding: 45px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border-top: 5px solid #009b9f; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; margin-bottom: 15px; border: 4px solid #f0f4f7; box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
        .diff-card h3 { font-size: 1.8rem; margin-bottom: 5px; color: #003b5c; }
        .diff-card h4 { font-family: 'Open Sans', sans-serif; font-size: 0.85rem; color: #009b9f; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 25px; }
        .contact-grid { width: 100%; text-align: left; font-size: 0.95rem; border-top: 1px solid #eee; padding-top: 20px; margin-bottom: 25px; }
        .contact-item { margin-bottom: 15px; display: flex; align-items: center; }
        .contact-icon { width: 30px; color: #003b5c; font-size: 1.2rem; }
        .contact-item a { color: #444; text-decoration: none; transition: color 0.3s; }
        .contact-item a:hover { color: #009b9f; }
        .contact-btn { width: 100%; background: #003b5c; color: white; padding: 15px; text-decoration: none; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; border-radius: 4px; transition: 0.3s; border: none; cursor: pointer; text-align: center; }
        .contact-btn:hover { background: #00263c; }

        /* The Financial Decisions Grid */
        .decisions-header { font-size: 1.4rem; font-weight: 800; color: #003b5c; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 25px; border-bottom: 2px solid #eaeaea; padding-bottom: 12px; }
        .decision-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 30px; margin-bottom: 60px; }
        .decision-card { background: #fff; padding: 40px; border: 1px solid #eaeaea; border-radius: 6px; box-shadow: 0 4px 15px rgba(0,0,0,0.02); }
        .decision-header-flex { display: flex; align-items: center; margin-bottom: 20px; }
        .decision-icon { width: 50px; height: 50px; background: #f0f4f7; color: #003b5c; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 20px; }
        .decision-card h4 { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: #003b5c; margin: 0; }
        .decision-card p { font-size: 0.95rem; color: #555; margin-bottom: 20px; }
        .decision-card ul { list-style: none; padding: 0; }
        .decision-card li { font-size: 0.9rem; color: #666; margin-bottom: 10px; position: relative; padding-left: 15px; }
        .decision-card li::before { content: '•'; color: #009b9f; position: absolute; left: 0; font-weight: bold; }

        /* Video Grid */
        .video-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 30px; margin-top: 40px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 8px; box-shadow: 0 6px 20px rgba(0,0,0,0.08); border: 1px solid #eaeaea; }
        .video-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }

        /* Who We Work With Grid */
        .client-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 30px; margin-top: 40px; }
        .client-card { background: #fff; padding: 40px 30px; text-align: center; border: 1px solid #eaeaea; border-radius: 4px; transition: box-shadow 0.3s; }
        .client-card:hover { box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .client-icon { width: 50px; height: 50px; background: #f0f4f7; color: #003b5c; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px auto; font-size: 1.2rem; }
        .client-card h4 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 15px; color: #003b5c; }
        .client-card p { font-size: 0.9rem; color: #666; line-height: 1.6; }

        /* Contact Form */
        .form-container { background: #fff; padding: 60px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); max-width: 800px; margin: auto; border-top: 5px solid #003b5c; }
        .input-group { margin-bottom: 25px; }
        input { width: 100%; padding: 18px; border: 1px solid #e1e1e1; font-size: 1rem; background: #fafafa; }
        button[type="submit"] { width: 100%; padding: 20px; background: #003b5c; color: #fff; font-size: 1.1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; border: none; cursor: pointer; transition: background 0.3s; }
        button[type="submit"]:hover { background: #00263c; }

        /* Footer */
        footer { background: #111; color: #777; padding: 70px 5%; font-size: 0.8rem; position: relative; z-index: 2; }
        footer .container { max-width: 1250px; margin: auto; }
        footer p { margin-bottom: 20px; line-height: 1.8; text-align: justify; }

        /* Custom Modal Pop-Up CSS - Z-INDEX BOOSTED TO MAXIMUM */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 25, 40, 0.85); z-index: 999999; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-content { background: #fff; padding: 50px; border-radius: 8px; max-width: 800px; width: 90%; position: relative; box-shadow: 0 15px 50px rgba(0,0,0,0.5); text-align: left; max-height: 90vh; overflow-y: auto; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; cursor: pointer; color: #999; transition: color 0.3s; }
        .modal-close:hover { color: #333; }
        .modal-content h2 { font-family: 'Playfair Display', serif; color: #003b5c; font-size: 2.2rem; margin-bottom: 20px; border-bottom: 2px solid #009b9f; padding-bottom: 10px; display: inline-block; }
        .modal-content p { font-size: 1.05rem; color: #555; margin-bottom: 15px; line-height: 1.7; }
        .modal-content ul { margin-top: 15px; padding-left: 20px; line-height: 1.8; color: #444; }
        .modal-content li { margin-bottom: 10px; }
